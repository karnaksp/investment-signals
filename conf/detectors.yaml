# ============================================================================
# Детектор аномалий — главный файл настроек порогов и окон.
# Редактируйте на лету: сервис detector подхватывает изменения по интервалу
# CONFIG_RELOAD_INTERVAL_SECONDS из .env (проверка mtime файла).
#
# Структура:
#   detector: — глобальные параметры для всех инструментов
#   per_instrument: — опционально, переопределения по ключу TICKER_CLASS
#
# Ключ инструмента совпадает с форматом в conf/instruments.yaml: TICKER_CLASS
# (например SBER_TQBR, BRM6_SPBFUT).
#
# Авто-пороги из пайплайна threshold-cron лежат в detectors.overrides.yaml
# и мержятся поверх этого файла (см. DETECTORS_OVERRIDES_CONFIG в .env).
# ============================================================================

detector:
  # Как часто (сек) пересчитывать выборки при наличии событий в окне.
  sample_every_seconds: 5

  # Минимум точек в истории для расчёта z-score (иначе сигнал не считается).
  min_baseline_points: 12

  # Максимум точек в каждой скользящей истории (обрезка «хвоста»).
  baseline_points: 120

  # Окно для ленты сделок: объём, число сделок, дельта по направлению (сек).
  trade_window_seconds: 60

  # Окно для оценки движения цены по last_price/trade (сек).
  price_window_seconds: 90

  # Окно для спреда и имбаланса стакана (сек).
  orderbook_window_seconds: 120

  # Пауза между любыми двумя алертами одного типа (сек), кроме combo сигналов.
  alert_cooldown_seconds: 120

  # --- Пороги z-score по типам сигналов ---
  # Чем выше — тем реже срабатывание (нужен более «редкий» выброс относительно базы).
  volume_zscore_threshold: 4.0
  trade_count_zscore_threshold: 4.0
  price_return_zscore_threshold: 3.5
  spread_zscore_threshold: 3.0
  imbalance_zscore_threshold: 3.0

  # Дополнительный порог по модулю имбаланса (0..1): ниже этого абсолютного
  # отклонения от 50/50 не считаем «аномальным» даже при высоком z-score.
  imbalance_absolute_threshold: 0.65

  # Минимальное движение цены в окне price_window (в базисных пунктах, bps).
  # 0 = фильтр выключен. Ненулевое значение можно задавать вручную или подставлять
  # из detectors.overrides.yaml (daily threshold-cron).
  price_move_absolute_threshold_bps: 0.0

  # --- Комбинированный сигнал «микроструктура» (long / short) ---
  # Включает совместную оценку: расширение спреда, имбаланс стакана,
  # всплеск частоты сделок, накопленная дельта по направлению сделок.
  combo_enabled: true

  # За сколько секунд «назад» считать компоненты combo актуальными (свежесть).
  combo_freshness_seconds: 15

  # Сумма баллов по компонентам должна быть >= этого числа для алерта combo.
  combo_min_score: 6

  # Отдельная пауза между алертами microstructure_combo_* (сек).
  combo_alert_cooldown_seconds: 180

  # Баллы за компоненты (настраивается «вес» каждого признака в итоговой сумме).
  combo_spread_points: 1
  combo_imbalance_points: 1
  combo_tick_rate_points: 2
  combo_delta_points: 2

  # Доля объёма bid от (bid+ask) на верхних уровнях: выше — «лонг», ниже — «шорт».
  combo_imbalance_long_threshold: 0.80
  combo_imbalance_short_threshold: 0.20

  # Минимальный |накопленная дельта по лотам| за trade_window, чтобы дать баллы за дельту.
  combo_delta_min_abs_qty: 1.0

# -----------------------------------------------------------------------------
# Переопределения только для выбранных инструментов (ключ = TICKER_CLASS).
# Любое поле из секции detector выше можно переопределить точечно.
#
# Пример:
# per_instrument:
#   BRM6_SPBFUT:
#     volume_zscore_threshold: 5.5
#     combo_min_score: 7
# -----------------------------------------------------------------------------
